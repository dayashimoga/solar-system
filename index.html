    <link rel="stylesheet" href="quickutils-core.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #020208; font-family: 'Inter', sans-serif; }
        #solarCanvas { display: block; width: 100vw; height: 100vh; cursor: grab; }
        #solarCanvas:active { cursor: grabbing; }
        .navbar { position: fixed; top: 0; left: 0; right: 0; z-index: 20; background: rgba(2,2,8,0.6); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.08); padding: 8px 16px; display: flex; align-items: center; justify-content: space-between; }
        .brand { color: #fff; text-decoration: none; font-weight: 700; font-size: 1.1rem; }
        .nav-links { display: flex; gap: 8px; align-items: center; }
        .nav-links a { color: #888; text-decoration: none; font-size: 0.85rem; }
        .btn { padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.8rem; font-weight: 600; }
        .btn-sm { padding: 4px 10px; font-size: 0.75rem; }
        .btn-secondary { background: rgba(255,255,255,0.1); color: #ccc; border: 1px solid rgba(255,255,255,0.15); }
        .btn-secondary:hover { background: rgba(255,255,255,0.2); color: #fff; }
        .kofi-link { color: #ff5e5b !important; font-weight: 600; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="https://quickutils.top" class="brand">🔭 Galaxy Explorer</a>
        <div class="nav-links">
            <button id="toggleConstellations" class="btn btn-secondary btn-sm">Constellations: ON</button>
            <button id="toggleMoons" class="btn btn-secondary btn-sm">Moons: ON</button>
            <a href="https://ko-fi.com/dayatin" target="_blank" class="kofi-link">☕ Support</a>
        </div>
    </nav>
    <div id="uiOverlay" style="position:fixed;bottom:20px;left:20px;z-index:20;background:rgba(2,2,8,0.7);padding:10px 15px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);backdrop-filter:blur(8px);">
        <div style="font-size:0.75rem;color:#888;margin-bottom:5px;font-weight:600;">ZOOM DEPTH</div>
        <div id="zoomLevelText" style="font-size:1.1rem;color:#fff;font-weight:700;">Local System</div>
        <div style="display:flex;gap:5px;margin-top:8px;">
            <button id="zoomInBtn" class="btn btn-secondary" style="padding:4px 10px;font-size:1.1rem;">+</button>
            <button id="zoomOutBtn" class="btn btn-secondary" style="padding:4px 10px;font-size:1.1rem;">-</button>
        </div>
    </div>
    <canvas id="solarCanvas"></canvas>
    <script src="quickutils-core.js"></script>
    <script src="script.js"></script>
